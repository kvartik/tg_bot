services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: kyberion
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kyberion}
      POSTGRES_DB: kyberion
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kyberion -d kyberion"]
      interval: 5s
      timeout: 3s
      retries: 10

  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://kyberion:${POSTGRES_PASSWORD:-kyberion}@db:5432/kyberion
    volumes:
      - ./backups:/app/backups
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
